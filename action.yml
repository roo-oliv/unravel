name: "Unravel PR"
description: "Analyze PR diffs with Unravel and post a walkthrough as a PR comment"
branding:
  icon: "git-pull-request"
  color: "purple"

inputs:
  api-key:
    description: "LLM API key (e.g. Anthropic API key)"
    required: true
  provider:
    description: "LLM provider (default: claude-api — CI has no local Claude CLI)"
    required: false
    # Use the legacy "anthropic" name so the action remains compatible with
    # older unravel releases on PyPI that predate the claude-api rename.
    # Newer versions normalize this alias to "claude-api" transparently.
    default: "anthropic"
  model:
    description: "Model to use (default: provider default)"
    required: false
    default: ""
  github-token:
    description: "GitHub token for posting comments (default: github.token)"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.12"

    - name: Install unravel
      shell: bash
      # setup-uv@v5 activates a venv at $VIRTUAL_ENV; install into that rather
      # than the externally-managed system Python.
      run: uv pip install unravel-review

    - name: Post in-progress placeholder comment
      shell: bash
      run: |
        unravel pr "${REPO}#${PR_NUMBER}" \
          --github-comment-placeholder \
          --head-sha "$HEAD_SHA" \
          > "$RUNNER_TEMP/unravel-placeholder.md"
        comment_id=$(
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -F "body=@${RUNNER_TEMP}/unravel-placeholder.md" \
            --jq .id
        )
        echo "UNRAVEL_COMMENT_ID=${comment_id}" >> "$GITHUB_ENV"
      env:
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Run analysis and generate comment
      shell: bash
      run: |
        args=(
          pr "${REPO}#${PR_NUMBER}"
          --github-comment
          --head-sha "$HEAD_SHA"
          --no-tui
          --no-cache
        )
        [ -n "$MODEL" ]    && args+=(--model "$MODEL")
        [ -n "$PROVIDER" ] && args+=(--provider "$PROVIDER")
        unravel "${args[@]}" > "$RUNNER_TEMP/unravel-comment.md"
      env:
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        UNRAVEL_API_KEY: ${{ inputs.api-key }}
        GH_TOKEN: ${{ inputs.github-token }}
        MODEL: ${{ inputs.model }}
        PROVIDER: ${{ inputs.provider }}

    - name: Update PR comment with walkthrough
      shell: bash
      run: |
        gh api --method PATCH \
          "repos/${REPO}/issues/comments/${UNRAVEL_COMMENT_ID}" \
          -F "body=@${RUNNER_TEMP}/unravel-comment.md"
      env:
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ inputs.github-token }}

    - name: Mark PR comment as failed
      if: failure() && env.UNRAVEL_COMMENT_ID != ''
      shell: bash
      run: |
        cat > "$RUNNER_TEMP/unravel-failed.md" <<EOF
        <!-- unravel-cache-v2-start -->
        <!-- unravel-cache-v2-sha:${HEAD_SHA} -->
        <!-- unravel-cache-v2-status:failed -->

        ### Unravel failed

        The Unravel action errored out — check the workflow logs for details.

        <!-- unravel-cache-v2-end -->
        EOF
        gh api --method PATCH \
          "repos/${REPO}/issues/comments/${UNRAVEL_COMMENT_ID}" \
          -F "body=@${RUNNER_TEMP}/unravel-failed.md"
      env:
        REPO: ${{ github.repository }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        GH_TOKEN: ${{ inputs.github-token }}
