name: docker

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push ghcr.io image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version from release tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $TAG"

      - name: Compute image tags
        id: tags
        env:
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          VERSION: ${{ steps.ver.outputs.version }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          TAGS="${IMAGE}:${VERSION}"
          if [ "$IS_PRERELEASE" != "true" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          echo "Tags: $TAGS"
          # Pass a newline-separated list to docker/build-push-action
          {
            echo "tags<<EOF"
            echo "$TAGS" | tr ',' '\n'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=AGPL-3.0-or-later
          cache-from: type=gha
          cache-to: type=gha,mode=max
