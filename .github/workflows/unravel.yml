name: unravel

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: unravel-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  walkthrough:
    name: Post unravel walkthrough
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
