services:
  postgres:
    image: postgres:16-alpine
    container_name: unravel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: unravel
      POSTGRES_PASSWORD: unravel
      POSTGRES_DB: unravel
    ports:
      # Host 5544 → container 5432 (5432/5433 commonly occupied locally).
      - "5544:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unravel -d unravel"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
